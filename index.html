<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>結 開運暦</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#e8dcc8;--warm:#f0e6d3;--gold:#c9a84c;--gold-l:#e8d4a0;--gold-d:#8b6914;
  --red:#c0392b;--dark-red:#8b1a1a;--ink:#2c1a0e;--ink-l:#5c3d2e;--green:#2d6a4f;--blue:#1a3a8b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Shippori Mincho','Noto Serif JP',serif;background:var(--cream);min-height:100vh;display:flex;justify-content:center;overscroll-behavior:none}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--warm);position:relative;display:flex;flex-direction:column}
.app::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(201,168,76,0.08),transparent 70%),radial-gradient(ellipse 60% 30% at 80% 20%,rgba(232,180,184,0.12),transparent 60%);pointer-events:none;z-index:0}
.petal{position:fixed;background:radial-gradient(ellipse,#ffb7c5 30%,rgba(255,183,197,0.3) 100%);border-radius:50% 0 50% 0;pointer-events:none;z-index:999;animation:fall linear infinite;opacity:0}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:0.6}90%{opacity:0.3}100%{transform:translateY(100vh) rotate(720deg) translateX(60px);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(201,168,76,0.2)}50%{box-shadow:0 0 20px rgba(201,168,76,0.5)}}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:72px;display:none;background:var(--warm)}
.page.active{display:block;animation:fadeIn 0.25s ease}
.divider{width:88%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:4px auto;position:relative;z-index:10}
.card{background:rgba(255,255,255,0.65);border:1px solid rgba(201,168,76,0.28);border-radius:16px;padding:12px;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(201,168,76,0.08)}
.section{margin:0 14px 12px;position:relative;z-index:10}
.sec-title{font-size:13px;font-weight:700;color:var(--gold-d);letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.pg-title-bar{padding:14px 20px 6px;display:flex;align-items:center;gap:8px;position:relative;z-index:10;animation:fadeUp 0.4s ease both}
.pg-title-bar h2{font-size:20px;font-weight:700;color:var(--ink)}
.home-header{position:relative;z-index:10;padding:14px 20px 4px;text-align:center;animation:fadeUp 0.5s ease both}
.home-header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hicons{display:flex;gap:14px;color:var(--ink-l);font-size:18px;cursor:pointer}
.logo-area{display:flex;align-items:center;justify-content:center;gap:8px}
.logo-emblem{width:42px;height:42px;background:var(--dark-red);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(139,26,26,0.35);font-size:20px}
.logo-title{font-size:36px;font-weight:800;color:var(--ink);letter-spacing:-1px;line-height:1}
.logo-sub{font-size:11px;color:var(--gold-d);letter-spacing:3px;font-weight:600}
.tagline{font-size:12px;color:var(--ink-l);letter-spacing:4px;margin:5px 0 7px}
.tagline::before,.tagline::after{content:'—';color:var(--gold);margin:0 5px}
.date-sec{position:relative;z-index:10;text-align:center;padding:0 20px 10px;animation:fadeUp 0.5s 0.1s ease both}
.date-main{font-size:32px;font-weight:700;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:2px}
.day-badge{width:30px;height:30px;background:var(--red);color:white;font-size:12px;font-weight:700;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.moon-wrap{position:absolute;right:18px;top:0;text-align:center}
.moon-icon{width:48px;height:48px;background:radial-gradient(circle at 30% 30%,#f5d78e,#c4860a);border-radius:50%;margin:0 auto 2px;box-shadow:inset -8px -4px 0 rgba(0,0,0,0.15),0 2px 8px rgba(196,134,10,0.3)}
.moon-age-txt{font-size:10px;color:var(--ink-l)}
.ry-badge{display:inline-block;background:linear-gradient(135deg,var(--gold-l),var(--gold));border:1px solid var(--gold);border-radius:20px;padding:4px 24px;margin-top:5px}
.ry-pre{font-size:12px;color:var(--ink-l)}.ry-name{font-size:20px;font-weight:700;color:var(--red)}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 14px;position:relative;z-index:10;animation:fadeUp 0.5s 0.2s ease both}
.card-ttl{font-size:11px;font-weight:700;color:var(--ink-l);display:flex;align-items:center;gap:4px;margin-bottom:7px}
.cnum{width:17px;height:17px;background:var(--ink);color:white;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.compass-wrap{position:relative;width:124px;height:124px;margin:0 auto}
.compass-ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(201,168,76,0.35);background:radial-gradient(circle,rgba(255,255,255,0.9),rgba(245,239,230,0.6))}
.compass-ring::before{content:'';position:absolute;inset:8px;border-radius:50%;border:1px dashed rgba(201,168,76,0.2)}
.cdir{position:absolute;font-size:9px;font-weight:700;color:var(--ink-l)}
.cn{top:3px;left:50%;transform:translateX(-50%)}.cs{bottom:3px;left:50%;transform:translateX(-50%)}
.ce{right:3px;top:50%;transform:translateY(-50%)}.cw{left:3px;top:50%;transform:translateY(-50%)}
.needle-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.needle-svg{width:52px;height:52px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));animation:spinSlow 24s linear infinite}
.dir-badges{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.dir-b{display:flex;align-items:center;justify-content:space-between;padding:3px 7px;border-radius:20px;font-size:10px;font-weight:600}
.num-big{font-size:50px;font-weight:900;line-height:1;color:var(--ink);text-align:center}
.num-desc{font-size:12px;font-weight:700;color:var(--red);text-align:center;margin:2px 0}
.num-sub{font-size:10px;color:var(--ink-l);text-align:center;line-height:1.5}
.num-sub strong{color:var(--red)}
.luck-list{display:flex;flex-direction:column;gap:4px;margin-top:7px;padding-top:7px;border-top:1px solid rgba(201,168,76,0.2)}
.luck-item{display:flex;align-items:center;justify-content:space-between;padding:3px 7px;background:rgba(255,255,255,0.5);border-left:3px solid var(--gold);border-radius:6px}
.luck-nm{font-size:10px;font-weight:600;color:var(--ink)}
.lbadge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;border:1.5px solid}
.lbadge-r{color:var(--red);border-color:var(--red)}.lbadge-g{color:var(--gold-d);border-color:var(--gold)}.lbadge-k{color:var(--ink-l);border-color:var(--ink-l)}
.month-sec{margin:0 14px 12px;background:rgba(255,255,255,0.55);border:1px solid rgba(201,168,76,0.2);border-radius:16px;padding:12px;position:relative;z-index:10;animation:fadeUp 0.5s 0.3s ease both}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mttl{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--ink)}
.more{font-size:11px;color:var(--gold-d);cursor:pointer}
.dcards{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.dcards::-webkit-scrollbar{display:none}
.dcard{flex:0 0 66px;background:rgba(255,255,255,0.7);border:1px solid rgba(201,168,76,0.22);border-radius:10px;padding:7px 4px;text-align:center;cursor:pointer;transition:transform 0.2s}
.dcard:hover{transform:translateY(-2px)}
.dcard.hl{background:#1a1a2e;border-color:transparent}
.dc-date{font-size:11px;font-weight:600;color:var(--ink);margin-bottom:2px}
.dcard.hl .dc-nm{color:rgba(255,255,255,0.7)}
.dc-ico{font-size:24px;display:block;margin:2px 0}
.dc-nm{font-size:9px;font-weight:600;color:var(--ink-l)}
.dc-moon-nm{font-size:10px;font-weight:700;color:var(--gold-l)}
.dc-today .dc-date{color:var(--gold-d)!important}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(201,168,76,0.4);background:rgba(255,255,255,0.6);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--gold-d);transition:all 0.2s}
.cal-nav-btn:hover{background:var(--gold-l)}
.cal-month-txt{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:2px}
.cal-week-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.cal-week-header span{text-align:center;font-size:10px;font-weight:700;padding:3px 0;color:var(--ink-l)}
.cal-week-header span:first-child{color:var(--red)}.cal-week-header span:last-child{color:var(--blue)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:3px 1px 2px;cursor:pointer;position:relative;transition:all 0.2s;min-height:48px}
.cal-day:hover:not(.other-month){background:rgba(201,168,76,0.12)}
.cal-day.today .cal-day-num{background:var(--red);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(192,57,43,0.35)}
.cal-day.other-month{opacity:0.25;pointer-events:none}
.cal-day.sunday:not(.today) .cal-day-num{color:var(--red)}
.cal-day.saturday:not(.today) .cal-day-num{color:var(--blue)}
.cal-day-num{font-size:12px;font-weight:700;color:var(--ink);line-height:22px;min-width:22px;text-align:center}
.cal-day-ry{font-size:7px;font-weight:700;color:var(--ink-l);margin-top:1px;line-height:1}
.cal-day.today .cal-day-ry{color:rgba(192,57,43,0.7)}
.cal-day-ry.daiann{color:var(--red)!important}.cal-day-ry.tomobiki{color:var(--green)!important}
.cal-day-sekki{font-size:7px;color:var(--gold-d);font-weight:700;margin-top:1px;line-height:1;text-align:center;white-space:nowrap}
.cal-day-moon{font-size:9px;line-height:1;margin-top:1px}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);margin:1px auto 0}
.cal-day.today .cal-dot{background:rgba(192,57,43,0.5)}
.cal-day.has-memo::after{content:'✏';font-size:7px;position:absolute;top:2px;right:2px;opacity:0.6}
.cal-ev-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,0.6);border:1px solid rgba(201,168,76,0.2);border-radius:10px;margin-bottom:6px}
.cal-ev-date{font-size:11px;font-weight:700;color:var(--gold-d);min-width:32px}
.cal-ev-ico{font-size:18px}
.cal-ev-name{font-size:12px;font-weight:600;color:var(--ink);flex:1}
.cal-ev-tag{font-size:9px;padding:1px 7px;border-radius:20px;border:1.5px solid var(--gold);color:var(--gold-d);font-weight:700}
.modal-overlay{position:fixed;inset:0;background:rgba(44,26,14,0.55);z-index:2000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex;animation:fadeIn 0.2s ease}
.modal-sheet{width:100%;max-width:430px;background:#fdf6ec;border-radius:24px 24px 0 0;padding:0 0 32px;max-height:85vh;overflow-y:auto;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:rgba(92,61,46,0.25);border-radius:2px;margin:12px auto 0}
.modal-header{padding:14px 18px 10px;border-bottom:1px solid rgba(201,168,76,0.3);background:#fdf6ec;position:relative}
.modal-date-big{font-size:20px;font-weight:700;color:#2c1a0e;letter-spacing:1px}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.modal-badge{font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px}
.modal-badge.ry{background:#e8d4a0;color:#8b6914;border:1px solid #c9a84c}
.modal-badge.sekki{background:#d4edda;color:#2d6a4f;border:1px solid #2d6a4f}
.modal-badge.moon{background:#1a1a2e;color:#e8d4a0;border:none}
.modal-badge.lucky{background:#ffe0e3;color:#8b1a1a;border:1px solid #c0392b}
.modal-body{padding:14px 18px;background:#fdf6ec}
.modal-memo-ttl{font-size:13px;font-weight:700;color:#8b6914;margin-bottom:8px;letter-spacing:1px}
.modal-memo-area{width:100%;min-height:100px;padding:11px 13px;background:#ffffff;border:1.5px solid rgba(201,168,76,0.4);border-radius:12px;font-family:'Shippori Mincho','Noto Serif JP',serif;font-size:13px;color:#2c1a0e;resize:none;outline:none;line-height:1.7;transition:border-color 0.2s}
.modal-memo-area:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,0.15)}
.modal-memo-area::placeholder{color:rgba(92,61,46,0.4)}
.modal-save-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;background:linear-gradient(135deg,#8b6914,#c9a84c);color:white;border:none;border-radius:12px;font-family:'Shippori Mincho',serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:1px;margin-top:10px}
.modal-save-btn:hover{opacity:0.88}
.modal-close-btn{position:absolute;top:14px;right:18px;width:28px;height:28px;border-radius:50%;border:1px solid rgba(92,61,46,0.3);background:#ffffff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#5c3d2e}
.big-compass{position:relative;width:240px;height:240px;margin:0 auto 16px}
.big-ring{position:absolute;inset:0;border-radius:50%;border:3px solid rgba(201,168,76,0.4);background:radial-gradient(circle,rgba(255,255,255,0.95),rgba(245,239,230,0.7));box-shadow:0 4px 24px rgba(201,168,76,0.12)}
.big-ring::before{content:'';position:absolute;inset:12px;border-radius:50%;border:1px dashed rgba(201,168,76,0.28)}
.big-cdir{position:absolute;font-weight:800;color:var(--ink-l)}
.bcn{top:5px;left:50%;transform:translateX(-50%);font-size:13px}
.bcs{bottom:5px;left:50%;transform:translateX(-50%);font-size:13px}
.bce{right:7px;top:50%;transform:translateY(-50%);font-size:13px}
.bcw{left:7px;top:50%;transform:translateY(-50%);font-size:13px}
.bcne{top:16px;right:20px;font-size:10px}.bcnw{top:16px;left:20px;font-size:10px}
.bcse{bottom:16px;right:20px;font-size:10px}.bcsw{bottom:16px;left:20px;font-size:10px}
.big-needle-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.big-needle{width:100px;height:100px;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2));animation:spinSlow 24s linear infinite}
.ldir-cards{display:flex;flex-direction:column;gap:8px}
.ldir-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.65);border:1px solid rgba(201,168,76,0.22);border-radius:14px;transition:all 0.2s}
.ldir-card:hover{transform:translateX(4px);box-shadow:0 3px 14px rgba(201,168,76,0.15)}
.ldir-dot{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.ldir-name{font-size:15px;font-weight:700;color:var(--ink)}
.ldir-type{font-size:11px;color:var(--ink-l);margin-top:1px}
.ldir-effect{font-size:11px;font-weight:600;color:var(--green);margin-left:auto;white-space:nowrap}
.num-hero{text-align:center;padding:22px 20px;background:linear-gradient(135deg,rgba(44,26,14,0.94),rgba(139,105,20,0.88));border-radius:20px;margin-bottom:14px;position:relative;overflow:hidden;animation:glow 4s ease infinite}
.num-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(201,168,76,0.18),transparent 60%)}
.num-hero-big{font-size:88px;font-weight:900;color:var(--gold-l);line-height:1;animation:pulse 3s ease infinite;position:relative}
.num-hero-desc{font-size:17px;font-weight:700;color:white;margin:4px 0;position:relative}
.num-hero-sub{font-size:12px;color:rgba(255,255,255,0.72);line-height:1.7;position:relative}
.num-hero-sub strong{color:var(--gold-l)}
.num-calc-box{background:rgba(255,255,255,0.6);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:var(--ink-l);line-height:1.8}
.num-calc-box strong{color:var(--ink);font-size:13px}
.num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.num-card{padding:10px 6px;background:rgba(255,255,255,0.6);border:1px solid rgba(201,168,76,0.2);border-radius:12px;text-align:center;cursor:pointer;transition:all 0.2s}
.num-card:hover,.num-card.active{background:linear-gradient(135deg,var(--gold-l),rgba(201,168,76,0.25));border-color:var(--gold)}
.num-card-n{font-size:26px;font-weight:900;color:var(--ink)}
.num-card-d{font-size:9px;font-weight:600;color:var(--ink-l);margin-top:1px;line-height:1.3}
.msg-oracle{text-align:center;padding:22px 18px;background:linear-gradient(155deg,rgba(44,26,14,0.93),rgba(139,26,26,0.85));border-radius:20px;margin-bottom:14px;position:relative;overflow:hidden}
.msg-oracle::before{content:'⛩';position:absolute;font-size:110px;opacity:0.05;top:50%;left:50%;transform:translate(-50%,-50%)}
.msg-oracle-lbl{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:2px;margin-bottom:10px}
.msg-oracle-ico{font-size:44px;margin-bottom:10px;display:block;animation:pulse 3s ease infinite}
.msg-oracle-txt{font-size:14px;color:white;line-height:1.9;font-weight:500;position:relative}
.msg-oracle-txt em{color:var(--gold-l);font-style:normal;font-weight:700}
.msg-cats{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.msg-cats::-webkit-scrollbar{display:none}
.msg-cat{flex:0 0 auto;padding:5px 14px;border-radius:20px;border:1.5px solid rgba(201,168,76,0.35);background:rgba(255,255,255,0.55);font-size:11px;font-weight:600;color:var(--ink-l);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.msg-cat.active,.msg-cat:hover{background:var(--gold-l);border-color:var(--gold);color:var(--gold-d)}
.msg-cards{display:flex;flex-direction:column;gap:9px}
.msg-card{padding:12px 14px;background:rgba(255,255,255,0.63);border:1px solid rgba(201,168,76,0.2);border-radius:13px;border-left:4px solid var(--gold);transition:all 0.2s}
.msg-card:hover{transform:translateX(3px)}
.msg-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.msg-card-ico{font-size:20px}
.msg-card-ttl{font-size:13px;font-weight:700;color:var(--ink)}
.msg-lv{font-size:9px;padding:1px 7px;border-radius:20px;font-weight:700;margin-left:auto}
.msg-lv.h{background:#ffe0e3;color:var(--dark-red);border:1px solid var(--red)}
.msg-lv.m{background:#fff0c4;color:var(--gold-d);border:1px solid var(--gold)}
.msg-lv.l{background:#d4edda;color:var(--green);border:1px solid var(--green)}
.msg-card-txt{font-size:11px;color:var(--ink-l);line-height:1.7}
.msg-card-txt strong{color:var(--ink)}
.memo-date-strip{background:linear-gradient(135deg,#2c1a0e,#8b6914);border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.memo-date-txt{font-size:14px;font-weight:700;color:white;letter-spacing:1px}
.memo-date-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px}

<script>
// ─── Utilities ───────────────────────────────────
function julianDate(y,m,d){
  if(m<=2){y--;m+=12}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524.5;
}
function moonAge(date){
  const y=date.getFullYear(),m=date.getMonth()+1;
  const d=date.getDate()+date.getHours()/24+date.getMinutes()/1440;
  return((julianDate(y,m,d)-2451551.26)%29.53058867+29.53058867)%29.53058867;
}

// ─── 六曜（正確な旧暦朔望月ベース計算）──────────────
function _nmJD(k){
  const T=k/1236.85,T2=T*T;
  let J=2451550.09766+29.530588861*k+0.00015437*T2;
  const M=(2.5534+29.10535670*k)*Math.PI/180;
  const Mp=(201.5643+385.81693528*k+0.0107582*T2)*Math.PI/180;
  const F=(160.7108+390.67050284*k-0.0016118*T2)*Math.PI/180;
  const Om=(124.7746-1.56375588*k+0.0020672*T2)*Math.PI/180;
  return J-0.40720*Math.sin(Mp)+0.17241*Math.sin(M)+0.01608*Math.sin(2*Mp)
    +0.01039*Math.sin(2*F)+0.00739*Math.sin(Mp-M)-0.00514*Math.sin(Mp+M)
    +0.00208*Math.sin(2*M)-0.00111*Math.sin(Mp-2*F)-0.00057*Math.sin(Mp+2*F)
    +0.00056*Math.sin(2*Mp+M)-0.00042*Math.sin(3*Mp)+0.00042*Math.sin(M+2*F)
    +0.00038*Math.sin(M-2*F)-0.00024*Math.sin(2*Mp-M)-0.00017*Math.sin(Om);
}
function _prevNM(jd){
  const k0=Math.round((jd-2451550.09766)/29.530588861);
  for(let k=k0+1;k>=k0-2;k--){if(_nmJD(k)<=jd)return{jd:_nmJD(k),k};}
}
// 閏月の朔k（2020-2029年）
const _LEAP=new Set([252,287,316,353]);
// 旧暦正月朔のk
const _NYK=[[2020,269],[2021,281],[2022,273],[2023,285],[2024,298],[2025,310],[2026,323],[2027,335],[2028,347],[2029,360]];
function _lm(k){
  let b=_NYK[0][1];
  for(const[,n]of _NYK){if(n<=k)b=n;else break;}
  let d=k-b,lc=0;
  for(let kk=b;kk<k;kk++){if(_LEAP.has(kk))lc++;}
  if(_LEAP.has(k))lc++;
  return(d-lc)%12+1;
}
const RY=['先勝','友引','先負','仏滅','大安','赤口'];
function getRY(y,m,d){
  const jd=julianDate(y,m,d);
  const nm=_prevNM(jd+15/24-0.0001);
  const ld=Math.floor(jd+9/24+0.5)-Math.floor(nm.jd+9/24+0.5)+1;
  return RY[(_lm(nm.k)+ld-2)%6];
}

function calcNum(y,m,d){
  let s=[...String(y),...String(m),...String(d)].reduce((a,c)=>a+parseInt(c),0);
  while(s>9)s=[...String(s)].reduce((a,c)=>a+parseInt(c),0);
  return s||9;
}
// 寅の日: 十二支で寅に当たる日（甲子からのJD余り）
function isTora(y,m,d){return Math.floor(julianDate(y,m,d)+0.5)%12===2;}
// 巳の日: 十二支で巳
function isMi(y,m,d){return Math.floor(julianDate(y,m,d)+0.5)%12===5;}

function getMonthEvents(y,m){
  const days=new Date(y,m,0).getDate(),evs=[];
  // 一粒万倍日（簡易固定日）
  [1,5,8,14,17,20,24,27].forEach(d=>{
    if(d<=days)evs.push({d,n:'一粒万倍日',ico:'🌾',hl:false});
  });
  // 天赦日（月によって異なる固定近似日）
  const tenshaDay={1:1,2:11,3:21,4:3,5:13,6:23,7:5,8:15,9:25,10:7,11:17,12:27};
  if(tenshaDay[m]&&tenshaDay[m]<=days)evs.push({d:tenshaDay[m],n:'天赦日',ico:'☀️✨',hl:false});
  // 寅の日・巳の日
  for(let d=1;d<=days;d++){
    if(isTora(y,m,d))evs.push({d,n:'寅の日',ico:'🐯',hl:false});
    if(isMi(y,m,d))evs.push({d,n:'巳の日',ico:'🐍',hl:false});
  }
  // 新月・満月（かわいいお月さま）
  for(let d=1;d<=days;d++){
    const age=moonAge(new Date(y,m-1,d,12,0));
    if(age<1.2)evs.push({d,n:'新月',ico:'🌑',hl:false});
    else if(age>13.8&&age<15.2)evs.push({d,n:'満月',ico:'🌕',hl:true});
  }
  return evs.sort((a,b)=>a.d-b.d);
}

function getSekki(year,month){
  const table={
    1:[{d:6,n:'小寒'},{d:20,n:'大寒'}],2:[{d:4,n:'立春'},{d:19,n:'雨水'}],
    3:[{d:6,n:'啓蟄'},{d:21,n:'春分'}],4:[{d:5,n:'清明'},{d:20,n:'穀雨'}],
    5:[{d:6,n:'立夏'},{d:21,n:'小満'}],6:[{d:6,n:'芒種'},{d:21,n:'夏至'}],
    7:[{d:7,n:'小暑'},{d:23,n:'大暑'}],8:[{d:7,n:'立秋'},{d:23,n:'処暑'}],
    9:[{d:8,n:'白露'},{d:23,n:'秋分'}],10:[{d:8,n:'寒露'},{d:23,n:'霜降'}],
    11:[{d:7,n:'立冬'},{d:22,n:'小雪'}],12:[{d:7,n:'大雪'},{d:22,n:'冬至'}],
  };
  const offset=Math.floor((year-2000)*0.0024);
  return(table[month]||[]).map(s=>({d:s.d+offset,n:s.n}));
}

  for(let m=1;m<=12;m++)mEl.innerHTML+=`<option value="${String(m).padStart(2,'0')}">${m}月</option>`;
  dEl.innerHTML='<option value="">日</option>';
  for(let d=1;d<=31;d++)dEl.innerHTML+=`<option value="${String(d).padStart(2,'0')}">${d}日</option>`;
}
function getBirthFromSelects(){
  const y=document.getElementById('birthYear').value;
  const m=document.getElementById('birthMonth').value;
  const d=document.getElementById('birthDay').value;
  if(!y||!m||!d)return'';
  return`${y}-${m}-${d}`;
}
function setBirthToSelects(birthStr){
  if(!birthStr)return;
  const parts=birthStr.split('-');
  if(parts.length<3)return;
  document.getElementById('birthYear').value=parts[0];
  document.getElementById('birthMonth').value=parts[1];
  document.getElementById('birthDay').value=parts[2];
}
function openSettings(){
  initBirthSelects();
  const p=getUserProfile();
  document.getElementById('settingsName').value=p.name||'';
  setBirthToSelects(p.birth||'');
  if(p.birth)showHonmyojoResult(p.birth);
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('open');}
function showHonmyojoResult(birthStr){
  const star=calcHonmyojo(birthStr);
  if(!star)return;
  const h=HONMYOJO[star-1];
  document.getElementById('honmyojoNum').textContent=`${star}`;
  document.getElementById('honmyojoName').textContent=h.n;
  document.getElementById('honmyojoDesc').textContent=h.desc;
  document.getElementById('settingsResult').style.display='block';
}
document.getElementById('settingsClose').addEventListener('click',closeSettings);
document.getElementById('settingsOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('settingsOverlay'))closeSettings()});
document.getElementById('settingsSaveBtn').addEventListener('click',()=>{
  const name=document.getElementById('settingsName').value.trim();
  const birth=getBirthFromSelects();
  if(!birth){alert('生年月日を選択してください');return;}
  saveUserProfile({name,birth});
  if(birth)showHonmyojoResult(birth);
  const btn=document.getElementById('settingsSaveBtn');
  btn.textContent='✓ 保存しました';
  btn.style.background='linear-gradient(135deg,#2d6a4f,#3d8b5a)';
  setTimeout(()=>{btn.textContent='✦ 保存する';btn.style.background='';},1600);
  if(currentPage==='direction')renderDirection();
});
document.querySelector('.hicons').addEventListener('click',openSettings);

// ─── DIRECTION ───────────────────────────────────
function renderDirection(){
  const p=getUserProfile();
  const star=p.birth?calcHonmyojo(p.birth):null;
  const el=document.getElementById('ldirCards');
  el.innerHTML='';
  if(star){
    const h=HONMYOJO[star-1];
    el.innerHTML+=`<div class="dir-personal-note">🌟 <strong>${p.name||'あなた'}</strong>の本命星：<strong style="color:${h.col}">${star} ${h.n}</strong><br>生年月日に基づいた個人吉方位です</div>`;
    const dirs=LUCKY_DIR_TABLE[star];
    const labels=['第一位','第二位','第三位','第四位'];
    dirs.forEach((dir,i)=>{
      const c=DCOLS[i%4];
      el.innerHTML+=`<div class="ldir-card"><div class="ldir-dot" style="background:${c.bg};color:${c.col}">${dir}</div><div><div class="ldir-name">${labels[i]}：${dir}</div><div class="ldir-type">${c.lbl}アップ</div></div><div class="ldir-effect">${c.eff}</div></div>`;
    });
    el.innerHTML+=`<div style="text-align:center;margin-top:10px"><span style="font-size:11px;color:var(--gold-d);cursor:pointer;text-decoration:underline" onclick="openSettings()">⚙ 生年月日を変更する</span></div>`;
  }else{
    el.innerHTML+=`<div style="text-align:center;padding:20px;background:rgba(255,255,255,0.6);border:1.5px dashed rgba(201,168,76,0.4);border-radius:16px;margin-bottom:12px"><div style="font-size:32px;margin-bottom:8px">🎂</div><div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px">生年月日を登録しましょう</div><div style="font-size:12px;color:var(--ink-l);margin-bottom:14px;line-height:1.6">本命星に基づいた<br>あなた専用の吉方位が表示されます</div><button onclick="openSettings()" style="padding:10px 24px;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:white;border:none;border-radius:12px;font-family:'Shippori Mincho',serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px">⚙ 設定する</button></div>`;
    const seed=(Y*31+M*7+D)%8;
    const ldirs=[[DIRS[seed%8],0],[DIRS[(seed+2)%8],1],[DIRS[(seed+5)%8],2],[DIRS[(seed+4)%8],3]];
    el.innerHTML+=`<div style="font-size:11px;color:var(--ink-l);margin-bottom:8px;text-align:center">※ 今日の日付ベースの参考方位</div>`;
    ldirs.forEach(([dir,ci],i)=>{
      const c=DCOLS[ci],rank=['第一位','第二位','第三位','第四位'][i];
      el.innerHTML+=`<div class="ldir-card" style="opacity:0.7"><div class="ldir-dot" style="background:${c.bg};color:${c.col}">${dir}</div><div><div class="ldir-name">${rank}：${dir}</div><div class="ldir-type">${c.lbl}アップ</div></div><div class="ldir-effect">${c.eff}</div></div>`;
    });
  }
}

// ─── NUMEROLOGY ──────────────────────────────────
function renderNumerology(){
  const num=calcNum(Y,M,D);
  document.getElementById('numHeroBig').textContent=num;
  document.getElementById('numHeroDesc').textContent=NUMS[num-1].d;
  document.getElementById('numHeroSub').innerHTML=NUMS[num-1].s;
  document.getElementById('numCalcBox').innerHTML=`<strong>本日の計算</strong><br>${Y}年${M}月${D}日<br>→ ${[...String(Y),...String(M),...String(D)].join('+')} → 数秘：<strong>${num}</strong>`;
  const grid=document.getElementById('numGrid');
  grid.innerHTML='';
  NUMS.forEach((n,i)=>{
    grid.innerHTML+=`<div class="num-card ${i===num-1?'active':''}"><div class="num-card-n">${i+1}</div><div class="num-card-d">${n.d}</div></div>`;
  });
}

// ─── MESSAGE ─────────────────────────────────────
let msgCat='総合';
function renderMessage(){
  const ry=getRY(Y,M,D);
  document.getElementById('msgOracleLbl').textContent=`${Y}年${M}月${D}日（${DAYS[dow]}）${ry}`;
  const oracles=[
    {ico:'🌸',txt:'今日は<em>神さまの恵み</em>があなたの周りに満ちています。感謝の心を持ち、素直に前へ進みましょう。'},
    {ico:'⛩',txt:'<em>清らかな心</em>でいることが今日の最大の開運行動です。余計なことに惑わされず自分の道を歩んでください。'},
    {ico:'🌕',txt:'月の光があなたを<em>正しい方向</em>へ導いています。直感を信じて行動するとき、流れに乗れます。'},
    {ico:'🌿',txt:'自然のエネルギーが高まっています。<em>大地のように</em>どっしりと構えることで幸運が引き寄せられます。'},
  ];
  const o=oracles[(Y*3+M*7+D)%oracles.length];
  document.getElementById('msgOracleIco').textContent=o.ico;
  document.getElementById('msgOracleTxt').innerHTML=o.txt;
  const catsEl=document.getElementById('msgCats');
  catsEl.innerHTML='';
  Object.keys(MSG_DATA).forEach(cat=>{
    catsEl.innerHTML+=`<div class="msg-cat ${cat===msgCat?'active':''}" data-cat="${cat}">${cat}</div>`;
  });
  catsEl.querySelectorAll('.msg-cat').forEach(c=>c.addEventListener('click',()=>{msgCat=c.dataset.cat;renderMessage()}));
  const cardsEl=document.getElementById('msgCards');
  cardsEl.innerHTML='';
  (MSG_DATA[msgCat]||[]).forEach(card=>{
    cardsEl.innerHTML+=`<div class="msg-card"><div class="msg-card-hdr"><span class="msg-card-ico">${card.ico}</span><span class="msg-card-ttl">${card.ttl}</span><span class="msg-lv ${card.lv}">${card.lvTxt}</span></div><div class="msg-card-txt">${card.txt}</div></div>`;
  });
}

// ─── MEMO ────────────────────────────────────────
function getMemos(){try{return JSON.parse(localStorage.getItem('kaiun_memos')||'[]')}catch{return[]}}
function saveMemos(arr){try{localStorage.setItem('kaiun_memos',JSON.stringify(arr))}catch{}}
function renderMemo(){
  const ry=getRY(Y,M,D);
  document.getElementById('memoDateTxt').textContent=`${Y}年${M}月${D}日（${DAYS[dow]}）`;
  document.getElementById('memoDateSub').textContent=`六曜：${ry}　月齢：${moonAge(today).toFixed(1)}`;
  document.getElementById('memoInput').value=getDayMemo(Y,M,D);
  const allDayMemos=[];
  try{
    for(let i=0;i<localStorage.length;i++){
      const key=localStorage.key(i);
      if(key&&key.startsWith('memo_')){
        const parts=key.split('_');
        if(parts.length===4){
          const[,ky,km,kd]=[...parts];
          const text=localStorage.getItem(key)||'';
          if(text){
            const dt=new Date(+ky,+km-1,+kd);
            allDayMemos.push({y:+ky,m:+km,d:+kd,text,dw:dt.getDay(),ry:getRY(+ky,+km,+kd),key});
          }
        }
      }
    }
  }catch{}
  allDayMemos.sort((a,b)=>new Date(b.y,b.m-1,b.d)-new Date(a.y,a.m-1,a.d));
  const legacyMemos=getMemos();
  const totalCount=allDayMemos.length+legacyMemos.length;
  document.getElementById('memoCount').textContent=`${totalCount}件`;
  const listEl=document.getElementById('memoItems');
  listEl.innerHTML='';
  if(!totalCount){listEl.innerHTML='<div class="memo-empty">✦ まだメモがありません<br>カレンダーの日付をタップして書きましょう</div>';return}
  allDayMemos.forEach(memo=>{
    listEl.innerHTML+=`<div class="memo-item"><div class="memo-item-header"><span class="memo-item-date">📅 ${memo.y}年${memo.m}月${memo.d}日（${DAYS[memo.dw]}）</span><span class="memo-item-ry">${memo.ry}</span><div class="memo-item-del" data-key="${memo.key}">✕</div></div><div class="memo-item-txt">${memo.text}</div></div>`;
  });
  [...legacyMemos].reverse().forEach((memo,i)=>{
    const idx=legacyMemos.length-1-i;
    listEl.innerHTML+=`<div class="memo-item"><div class="memo-item-header"><span class="memo-item-date">📅 ${memo.date}</span><span class="memo-item-ry">${memo.ry||''}</span><div class="memo-item-del" data-legacy-idx="${idx}">✕</div></div><div class="memo-item-txt">${memo.text}</div></div>`;
  });
  listEl.querySelectorAll('.memo-item-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(btn.dataset.key){try{localStorage.removeItem(btn.dataset.key)}catch{}}
      else if(btn.dataset.legacyIdx!==undefined){const arr=getMemos();arr.splice(+btn.dataset.legacyIdx,1);saveMemos(arr);}
      renderMemo();
    });
  });
}
document.getElementById('memoSaveBtn').addEventListener('click',()=>{
  const text=document.getElementById('memoInput').value.trim();
  setDayMemo(Y,M,D,text);
  renderMemo();
  const btn=document.getElementById('memoSaveBtn');
  btn.textContent='✓ 保存しました';btn.style.background='linear-gradient(135deg,#2d6a4f,#3d8b5a)';
  setTimeout(()=>{btn.textContent='✦ メモを保存する';btn.style.background=''},1800);
});

// ─── SWIPE ───────────────────────────────────────
let tx=0,ty=0;
document.getElementById('pages').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.getElementById('pages').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(currentPage==='home'){
      if(dx<0){homeOffset++;renderHome(homeOffset,'left')}
      else{homeOffset--;renderHome(homeOffset,'right')}
    }else{
      const idx=PAGE_ORDER.indexOf(currentPage);
      if(dx<0&&idx<PAGE_ORDER.length-1)goPage(PAGE_ORDER[idx+1]);
      else if(dx>0&&idx>0)goPage(PAGE_ORDER[idx-1]);
    }
  }
},{passive:true});

const pc=document.getElementById('petals');
for(let i=0;i<12;i++){
  const p=document.createElement('div'),sz=7+Math.random()*8;
  p.className='petal';
  p.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;animation-duration:${10+Math.random()*12}s;animation-delay:${Math.random()*20}s`;
  pc.appendChild(p);
}

renderHome(0);
</script>
